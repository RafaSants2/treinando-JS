<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Frutas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 5px;
        }

        .cincoLetras {
            color: blue;
        }

    </style>
</head>
<body>
    <div id="container">
        <h2>Frutas</h2>
        <button id="btn">Mostrar frutas</button>
        <div id="caixa"></div>
        
    </div>

    <script>
        const botao = document.getElementById("btn");
        const caixa = document.getElementById("caixa")
        const frutas = [
            "Maçã",
            "Banana",
            "Uva",
            "Manga",
            "Abacaxi"
        ];

        const lista = frutas.map(fruta => {
            return {
                nome: fruta,
                tamanhoNome: fruta.length
            };
        });

        function renderizar() {
            caixa.innerHTML = "";

            lista.forEach(fruta => {
                const div = document.createElement("div");
                const h3 = document.createElement("h3");
                h3.textContent = fruta.nome;
                const p = document.createElement("p");
                p.textContent = `Possui ${fruta.tamanhoNome} letras.`;

                if (fruta.tamanhoNome > 5) {
                    p.classList.add("cincoLetras");
                };

                div.appendChild(h3);
                div.appendChild(p);
                caixa.appendChild(div);
            });
        };

        botao.addEventListener("click", () => {
            renderizar();
        })
    </script>
</body>
</html>
