<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        #produtos {
            height: 100vh;
            display: flex;
            flex-flow: column nowrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .produto {
            font-weight: bold;
            border: 2px solid white;
            outline: 2px solid black;
            padding: 10px;
        }

        .caro {
            color: red;
        }
    </style>
</head>
<body>
    <div id="produtos">
        <!--h2 NOME-->
        <!--p preço original-->
        <!--p preço com desconto 15%-->
    </div>

    <script>
        const ListaProdutos = document.getElementById("produtos");
        const produtos = [
            { nome: "Teclado", preco: 120 },
            { nome: "Mouse", preco: 80 },
            { nome: "Monitor", preco: 900 },
            { nome: "Headset", preco: 250 },
            { nome: "Cadeira Gamer", preco: 510 }
        ];
        const desconto = 0.15;
        //Primeiro: transformar os dados
        const produtosComDesconto = produtos.map(produto => {
            const valorDesconto = produto.preco * desconto;

            return {
                nome: produto.nome,
                precoOriginal: produto.preco,
                precoComDesconto: produto.preco - valorDesconto
            };
        });
        //Depois: renderizar no DOM
        produtosComDesconto.forEach(produto => {
            const container = document.createElement("div");
            container.classList.add("produto");

            const nome = document.createElement("h2");
            nome.textContent = produto.nome

            const precoOriginal = document.createElement("p");
            precoOriginal.textContent = `Preço original: R$ ${produto.precoOriginal.toFixed(2)}`; //Esse "toFixed(2)" resolve casas decimais.

            const precoDesconto = document.createElement("p");
            precoDesconto.textContent = `Com desconto: R$ ${produto.precoComDesconto.toFixed(2)}`;

            if (produto.precoOriginal > 500) {
                container.classList.add("caro");
            }

            container.appendChild(nome);
            container.appendChild(precoOriginal);
            container.appendChild(precoDesconto);

            ListaProdutos.appendChild(container);
        });
    </script>
</body>
</html>
