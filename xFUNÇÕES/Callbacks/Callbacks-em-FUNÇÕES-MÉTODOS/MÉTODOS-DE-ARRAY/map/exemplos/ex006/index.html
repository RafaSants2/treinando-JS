<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div class="filho">
            <input type="text" id="num" readonly>
            <hr>
            <div class="numOper">
                <button class="resultado">=</button>
                <button class="mult">*</button>
                <button class="div">/</button>
                <button class="menos">-</button>
                <button class="mais">+</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="zero">0</button>
                <button>.</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
