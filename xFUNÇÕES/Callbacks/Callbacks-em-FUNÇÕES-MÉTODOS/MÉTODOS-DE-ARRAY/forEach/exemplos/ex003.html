<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li {
            font-size: 30px;
        }
    </style>
</head>
<body>
    <ul id="lista"> </ul>

    <script>
        const lista = document.getElementById("lista");
        const itens = [
            "Estudar JavaScript",
            "Treinar lógica",
            "Revisar objetos",
            "Praticar DOM"
        ];

        itens.forEach(item => {
            const li = document.createElement("li")
            li.textContent = item;
            lista.appendChild(li);
        });
    </script>
</body>
</html>
