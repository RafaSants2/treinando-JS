<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        div#container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .ativo {
            font-weight: bold;
            font-size: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }

        button#btn {
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="container">
        <ul id="lista"></ul>
        <button id="btn">Mostrar Eletrônicos</button>
    </div>

    <script>
        const ul = document.getElementById("lista")
        const btn = document.getElementById("btn")
        const produtos = [
            { nome: "Notebook", preco: 3500, categoria: "eletronico" },
            { nome: "Mouse", preco: 80, categoria: "eletronico" },
            { nome: "Cadeira", preco: 450, categoria: "movel" },
            { nome: "Teclado", preco: 120, categoria: "eletronico" },
            { nome: "Mesa", preco: 900, categoria: "movel" }
        ];
        
        btn.addEventListener("click", () => {
            ul.innerHTML = "";

            const eletronicos = produtos.filter(produto => produto.categoria === "eletronico");

            eletronicos.forEach(produto => {
                const li = document.createElement("li");

                li.textContent = `${produto.nome} - R$ ${produto.preco}`;

                ul.appendChild(li);
            })
        });
    </script>
</body>
</html>
